services:
  ghost:
    image: ${GHOST_IMAGE:-ghost:5-alpine}
    container_name: ghost
    restart: unless-stopped
    environment:
      url: ${GHOST_URL}
      NODE_ENV: production

      database__client: mysql
      database__connection__host: db
      database__connection__user: ghost
      database__connection__password: ${GHOST_DB_PASSWORD}
      database__connection__database: ghost

      # Behind Cloudflare Tunnel — trust forwarded headers for correct client IPs.
      server__host: 0.0.0.0
      server__port: 2368

      # Mail — generic SMTP. Leave MAIL_* unset to disable email entirely.
      mail__transport: ${MAIL_TRANSPORT:-SMTP}
      mail__from: ${MAIL_FROM:-}
      mail__options__host: ${MAIL_HOST:-}
      mail__options__port: ${MAIL_PORT:-587}
      mail__options__secure: ${MAIL_SECURE:-false}
      mail__options__auth__user: ${MAIL_USER:-}
      mail__options__auth__pass: ${MAIL_PASSWORD:-}
    volumes:
      - ghost_content:/var/lib/ghost/content
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ghost_network
    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "require('http').get({host:'localhost',port:2368,path:'/ghost/api/admin/site/',headers:{'X-Forwarded-Proto':'https'}},r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    mem_limit: ${GHOST_MEM_LIMIT:-768m}
    mem_reservation: 256m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    container_name: ghost_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ghost
      MYSQL_USER: ghost
      MYSQL_PASSWORD: ${GHOST_DB_PASSWORD}
    volumes:
      - ghost_db:/var/lib/mysql
    networks:
      - ghost_network
    command:
      - '--default-authentication-plugin=mysql_native_password'
      - '--performance-schema=OFF'
      - '--innodb-buffer-pool-size=${MYSQL_BUFFER_POOL:-128M}'
      - '--max-connections=50'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    mem_limit: ${DB_MEM_LIMIT:-512m}
    mem_reservation: 256m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - SETFCAP
      - SYS_NICE
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: ${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:latest}
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
      TUNNEL_METRICS: 0.0.0.0:2000
    networks:
      - ghost_network
    depends_on:
      ghost:
        condition: service_healthy
    # No healthcheck: the distroless cloudflared image has no shell and no curl/wget.
    # restart: unless-stopped + tunnel reconnect logic is sufficient.
    mem_limit: ${CLOUDFLARED_MEM_LIMIT:-128m}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  ghost_content:
    driver: local
  ghost_db:
    driver: local

networks:
  ghost_network:
    driver: bridge
